<link rel="stylesheet" href="src/pages/login.page.css">
<div class="login-page container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <h2 class="mb-1">SkillSwap</h2>
            <p class="text-muted mb-0">Learn, share, and connect.</p>
          </div>

          <input type="radio" name="auth-tab" id="loginTab" class="auth-tab-input" checked>
          <input type="radio" name="auth-tab" id="registerTab" class="auth-tab-input">

          <div class="auth-tab-buttons d-flex gap-2 mb-4">
            <label for="loginTab" class="auth-tab-btn flex-fill text-center">Login</label>
            <label for="registerTab" class="auth-tab-btn flex-fill text-center">Register</label>
          </div>

          <div class="auth-forms">
            <form id="loginForm" class="auth-form login-form">
              <h4 class="mb-3">Login</h4>

              <div class="mb-3">
                <label for="loginEmail" class="form-label">Email</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email">
              </div>

              <div class="mb-3">
                <label for="loginPassword" class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password">
              </div>

              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <form id="registerForm" class="auth-form register-form">
              <h4 class="mb-3">Register</h4>

              <div class="mb-3">
                <label for="registerName" class="form-label">Username</label>
                <input type="text" id="registerName" class="form-control" placeholder="Choose a username">
              </div>

              <div class="mb-3">
                <label for="registerEmail" class="form-label">Email</label>
                <input type="email" id="registerEmail" class="form-control" placeholder="Enter your email">
              </div>

              <div class="mb-3">
                <label for="registerPassword" class="form-label">Password</label>
                <input type="password" id="registerPassword" class="form-control" placeholder="Create a password">
              </div>

              <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password">
              </div>

              <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
