<div id="request-modal" class="modal fade request-modal" tabindex="-1" aria-hidden="true">
    <!-- TODO warning with aria-hidden -> to review -->
    <div class="modal-dialog">
        <div class="modal-content">
            <div>
                <div class="modal-title h5 mb-1"><i class="modal-title-icon bi bi-pencil-fill"></i>Edit Request Info</div>
                <p class="modal-subtitle">Update the details of your swap request.</p>
            </div>
            <form id="request-form">
                <div class="mb-3">
                    <label for="request-name" class="form-label">Request name</label>
                    <input type="text" class="form-control" id="request-name" name="name"
                        placeholder="Request name">
                </div>
                <div class="mb-3">
                    <label for="request-learn" class="form-label">Skill you want to learn</label>
                    <input type="text" class="form-control" id="request-learn" name="learnSkill"
                        placeholder="Skill you want to learn">
                </div>

                <div class="mb-3">
                    <label for="request-offering-skills" class="form-label">Skills you are offering</label>
                    <input type="text" class="form-control" id="request-offering-skills" name="offeringSkills"
                        placeholder="e.g. Python, Django, Web Scraping">
                </div>

                <div class="mb-3">
                    <label for="request-description" class="form-label">Description</label>
                    <textarea class="form-control" id="request-description" name="description" rows="4"
                        placeholder="Describe what you want to learn, your goals, and any preferences."></textarea>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="request-session-format" class="form-label">Session format</label>
                        <select class="form-select" id="request-session-format" name="format">
                            <option value="" selected>Select a format</option>
                            <option value="Online">Online</option>
                            <option value="In-person">In-person</option>
                            <option value="Hybrid">Hybrid</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="request-duration" class="form-label">Duration per session</label>
                        <input type="text" class="form-control" id="request-duration" name="duration"
                            placeholder="e.g. 1-2 hours per week">
                    </div>
                </div>

                <div class="mb-3 mt-3">
                    <label for="request-availability" class="form-label">Availability</label>
                    <input type="text" class="form-control" id="request-availability" name="availability"
                        placeholder="e.g. Weeknights 6-9pm">
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="app-btn btn-outline-ink" data-bs-dismiss="modal">Cancel</button>
                    <button id="btn-submit" type="submit" class="app-btn btn-accent">Save changes</button>
                </div>
            </form>
        </div>
    </div>
