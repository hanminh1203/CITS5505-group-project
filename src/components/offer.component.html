<div class="offer-card">
    <div class="mini-avatar avatar-36"><span app-data-value="offerer.initial">JD</span></div>
    <div class="flex-grow-1">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <div class="offer-user"><span app-data-value="offerer.name"></span></div>
                <div class="offer-skill">Offering skill <span app-data-value="skill.name"></span> with level <span app-data-value="level"></span></div>
            </div>
            <div class="d-flex gap-2">
                <button class="app-btn btn-accent app-btn-small">Accept</button>
                <button class="app-btn btn-outline-ink app-btn-small">Decline</button>
            </div>
        </div>
        <div class="offer-msg"><span app-data-value="message"></span></div>
    </div>
</div>
