<div id="error-modal" class="modal fade error-modal modal-lg" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div>
                <div class="modal-title h5 mb-1">
                    <i class="modal-title-icon bi bi-x-circle-fill"></i>Error
                </div>
            </div>
            <div>
                <div class="mt-3">
                    {{ message }}
                </div>
            </div>

            {% if debug and stacktrace %}
                <div class="row mb-3">
                    <details class="text-start" open>
                        <pre>{{ stacktrace }}</pre>
                    </details>
                </div>
            {% endif %}

            <div class="d-flex justify-content-end gap-2">
                <button id="btn-ok" type="button" class="app-btn btn-accent">OK</button>
            </div>
        </div>
    </div>
</div>
