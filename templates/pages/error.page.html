{% extends 'pages/base.page.html' %}
{% block main %}
<section class="d-flex flex-column align-items-center justify-content-center text-center">
    <div class="error-code">{{ code }}</div>
    <div class="error-name">{{ name }}</div>
    <h1 class="error-description">{{ description }}</h1>
    <div class="error-message">{{ message }}</div>
    <div class="error-stacktrace">
        {% if stacktrace %}
            <details class="text-start" open>
                <summary>Stack Trace</summary>
                <pre>{{ stacktrace }}</pre>
            </details>
        {% endif %}
    </div>
    <div>
        <a href="{{ url_for('public.index') }}" class="app-btn btn-accent"><i class="bi bi-house-fill me-2"></i>Go back to home</a>
        <a id="btn-go-back" class="app-btn btn-outline-ink"><i class="bi bi-arrow-left me-2"></i>Go back</a>
    </div>
</section>
{% endblock %}
