<div class="offer-card">
    <div class="mini-avatar avatar-36">{{ offer.offer_skill.user.name | get_initials }}</div>
    <div class="flex-grow-1">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <div class="offer-user">{{ offer.offer_skill.user.name }}</div>
                <div class="offer-skill">Offering skill {{offer.offer_skill.name }} with level {{offer.offer_skill.level }}</div>
            </div>
            <div class="d-flex gap-2">
                <button class="app-btn btn-accent app-btn-small">Accept</button>
                <button class="app-btn btn-outline-ink app-btn-small">Decline</button>
            </div>
        </div>
        <div class="offer-msg">{{offer.message}}</div>
    </div>
</div>
