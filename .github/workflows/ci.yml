name: Flask CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8 - Critical Error Check
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Lint with flake8 - Quality & Complexity Check
      run: |
        flake8 . --count --max-complexity=10 --max-line-length=127 --statistics

    - name: Build/Run Smoke Test
      env:
        FLASK_ENV: testing
      run: |
        # This attempts to start the server and checks if it crashes immediately
        # We use 'timeout' to kill it after 10 seconds if it stays running (which is good)
        timeout 10s flask --app run run || [ $? -eq 124 ]